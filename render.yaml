services:
  - type: web
    name: regional-tour-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scripts.seed_database --if-empty && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        value: sqlite:////var/data/regional_tour.db
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
    disk:
      name: regional-tour-data
      mountPath: /var/data
      sizeGB: 1
